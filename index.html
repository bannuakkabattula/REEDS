<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f3ff;
    font-family: 'Inter', sans-serif;
    padding: 1rem;
  }

  .err-card {
    background: linear-gradient(135deg, #fdf6f0 0%, #f9f0fb 50%, #f0f6fd 100%);
    border: 1.5px solid #e8d5f5;
    border-radius: 20px;
    padding: 3rem 2.5rem;
    text-align: center;
    max-width: 480px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .err-card::before {
    content: '';
    position: absolute;
    top: -50px; left: -50px;
    width: 150px; height: 150px;
    border-radius: 50%;
    background: #fde8f5;
    opacity: 0.5;
  }

  .err-card::after {
    content: '';
    position: absolute;
    bottom: -50px; right: -50px;
    width: 170px; height: 170px;
    border-radius: 50%;
    background: #e8f0fd;
    opacity: 0.5;
  }

  .err-inner { position: relative; z-index: 1; }

  .err-icon {
    width: 72px; height: 72px;
    background: #f5e6ff;
    border: 1.5px solid #d9b8f5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.2rem;
  }

  .err-icon i { font-size: 32px; color: #9b5dc8; }

  .err-code {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 4rem;
    line-height: 1;
    color: #5a3472;
    margin-bottom: 0.5rem;
  }

  .err-title {
    font-size: 1.1rem;
    font-weight: 500;
    color: #3a6ba8;
    margin-bottom: 0.6rem;
  }

  .err-text {
    font-size: 0.875rem;
    color: #8a6aaa;
    line-height: 1.6;
    margin-bottom: 1.8rem;
  }

  .err-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #9b5dc8;
    color: #ffffff;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 10px 22px;
    border-radius: 30px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .err-btn:hover { background: #8a4cb8; }
</style>
</head>
<body>

<div class="err-card">
  <div class="err-inner">

    <div class="err-icon">
      <i class="ti ti-map-pin-off"></i>
    </div>

    <h1 class="err-code">404</h1>
    <p class="err-title">Page not found</p>
    <p class="err-text">
      The page you're looking for doesn't exist or may have been moved.<br>
      Let's get you back on track.
    </p>

    <a href="/" class="err-btn">
      <i class="ti ti-home"></i> Back to home
    </a>

  </div>
</div>

</body>
</html>
